  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  </head>
  <body>
    <head>
  <!-- SEO Meta Tags -->
  <meta name="title" content="Omkar - Web Developer Portfolio">
  <meta name="description" content="Portfolio of Omkar, a web developer skilled in HTML, CSS, JavaScript, and React, showcasing projects and technical skills.">
  <meta name="keywords" content="Omkar, web developer, portfolio, HTML, CSS, JavaScript, React">
  <meta name="author" content="Omkar">

  <!-- Open Graph Tags -->
  <meta property="og:title" content="Omkar - Web Developer Portfolio">
  <meta property="og:description" content="Check out my projects and skills as a web developer specializing in React.">
  <meta property="og:image" content="your-photo.jpg">
  <meta property="og:url" content="https://yourportfolioURL.com">
  <meta property="og:type" content="website">

  <!-- Twitter Card Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Omkar - Web Developer Portfolio">
  <meta name="twitter:description" content="Check out my projects and skills as a web developer specializing in React.">
  <meta name="twitter:image" content="your-photo.jpg">
</head>

<body>

  <!-- Profile Photo with figure/figcaption -->
  <figure>
    <img src="your-photo.jpg" alt="Omkar smiling, wearing a casual shirt, standing in front of a plain background">
    <figcaption>Omkar - Web Developer</figcaption>
  </figure>

  <!-- Projects Section with Embedded YouTube Video -->
  <section class="project-video">
    <h3>Project Demo</h3>
    <iframe 
      width="560" 
      height="315" 
      src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
      title="Portfolio project demo video" 
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
      Your browser does not support embedded videos. 
      <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Watch it on YouTube instead</a>.
    </iframe>
  </section>

</body>
  </body>
  </html>
